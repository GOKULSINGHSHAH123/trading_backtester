# Configuration for Multi-Timeframe EMA Strategy (Fast Mode)
strategy_id: "MULTI_TF_EMA_FAST_001"
strategy_path: "multi_tf_ema_fast.multi_tf_ema_fast.MultiTimeframeEmaStrategy"

# We request 'all' instruments
instrument_source: all

# Timeframes to process
timeframes: ["15m", "30m", "1h", "2h"]

parameters:
  quantity: 10
  ema_span: 100
  stop_loss: 0.02    # 2% SL
  take_profit: 0.05  # 5% TP
